; =========================================
; Kotoba Plus Configuration File
; =========================================

[General]
first_run = true
app_version = 1.0
auto_save = true
check_updates = false

[UI]
theme = dark            ; dark | light | system
primary_color = indigo  ; indigo | blue | bluegrey | etc
accent_color = blue
font_family = default
font_size = 14
show_furigana = true
compact_mode = false
animations = true

[Language]
interface = en          ; UI language
gloss_languages = en,es ; languages shown in dictionary gloss
fallback_language = en

[Dictionary]
max_results = 50
search_on_typing = true
search_delay_ms = 150
remember_last_query = true
highlight_matches = true
page_size = 20

[SRS]
daily_new_cards = 20
daily_review_limit = 200
learning_steps = 1,10   ; minutes
graduating_interval = 1 ; days
easy_interval = 4       ; days
starting_ease = 2.5
bury_related = true
show_answer_auto = false

[Audio]
enabled = false
volume = 80
auto_play = false

[Data]
dict_path = dict.kotoba
dict_index_path = dict.kotoba.idx
srs_db_path = srs.bin
srs_event_log_path = srs_events.log
jp_path = jp.invx
gloss_en_path = gloss_en.invx
gloss_es_path = gloss_es.invx
backup_enabled = true
backup_interval_days = 7
